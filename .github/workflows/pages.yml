name: Pages · publish

# Builds the React frontend and publishes the static bundle to
# GitHub Pages at https://<user>.github.io/medallion-lab/.
#
# Two stages:
#   1. build   tsc + vite build with BASE_PATH=/medallion-lab/
#   2. deploy  upload artifact -> Pages.
#
# Optional: set repo secret `VITE_API_BASE` to a hosted backend URL
# (e.g. a Railway public URL) to wire the deployed Pages site to a
# live API. Without it, Acts 1-9 render visually but /api calls 404.

on:
  push:
    branches: [main]
    paths:
      - "app/frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Required GH Pages permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't pile up overlapping deploys.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install npm deps
        working-directory: app/frontend
        run: npm ci

      - name: Build with subpath base
        working-directory: app/frontend
        env:
          BASE_PATH: /medallion-lab/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
