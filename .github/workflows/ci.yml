name: CI

# Multi-stage CI for Medallion Lab.
# Stages run in parallel where possible; docker-build waits for the
# first three so a broken test doesn't burn buildx time.
#
#   1. backend-test    pytest against an isolated SQLite tempdir
#   2. frontend-build  tsc --noEmit + vite build (production bundle)
#   3. backend-lint    bytecompile every .py + import smoke-check
#   4. docker-build    multi-stage Dockerfile builds end-to-end

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- Stage 1: backend tests ----------------------------------------
  backend-test:
    name: Backend · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt pytest

      - name: Run pytest
        working-directory: app
        env:
          # Smaller seed sizes for fast CI runs while still meaningful.
          SEED_ROWS: "800"
          SEED_CUSTOMERS: "120"
          SEED_PRODUCTS: "40"
          SEED_FINANCE_MONTHS: "6"
          SEED_FINANCE_EMPLOYEES: "12"
          SEED_FINANCE_VENDORS: "12"
        run: pytest tests/ -v --tb=short

  # ----- Stage 2: frontend build ---------------------------------------
  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install npm deps
        working-directory: app/frontend
        run: npm ci

      - name: Type-check
        working-directory: app/frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: app/frontend
        run: npm run build

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist
          retention-days: 7

  # ----- Stage 3: backend lint (bytecompile + import smoke) ------------
  backend-lint:
    name: Backend · compile + import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Bytecompile every backend module
        run: python -m compileall -q app/backend

      - name: Smoke-import the FastAPI app
        working-directory: app
        run: python -c "from backend.main import app; print('OK', app.title)"

  # ----- Stage 4: Docker image (depends on the three above) ------------
  docker-build:
    name: Docker · build image
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: medallion-lab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke-test the container
        run: |
          set -euo pipefail

          # Boot with reduced seed sizes — the default 25k+ rows is fine
          # on a laptop but slow on a small GH runner. We just need to
          # prove the container serves the API end-to-end.
          docker run -d --name medallion-test \
            -e SEED_ROWS=800 \
            -e SEED_CUSTOMERS=120 \
            -e SEED_PRODUCTS=40 \
            -e SEED_STORES=12 \
            -e SEED_OLTP=400 \
            -e SEED_BANKING=400 \
            -e SEED_TELECOM=400 \
            -e SEED_FINANCE_MONTHS=6 \
            -e SEED_FINANCE_EMPLOYEES=12 \
            -e SEED_FINANCE_VENDORS=12 \
            -p 8000:8000 medallion-lab:ci

          # Poll up to 90s. The grep regex tolerates either compact
          # ("seeded":true) or pretty ("seeded": true) JSON.
          ready=""
          for i in $(seq 1 90); do
            response=$(curl -fsS http://localhost:8000/api/health 2>/dev/null || true)
            if printf '%s' "$response" | grep -Eq '"seeded"[[:space:]]*:[[:space:]]*true'; then
              echo "container healthy after ${i}s"
              echo "health: $response"
              ready=1
              break
            fi
            sleep 1
          done

          if [ -z "$ready" ]; then
            echo "container failed to become healthy after 90s"
            echo "last health response: ${response:-<empty>}"
            echo "----- docker logs -----"
            docker logs medallion-test
            docker stop medallion-test >/dev/null || true
            exit 1
          fi

          # Smoke each major API surface once.
          echo "----- /api/health -----"
          curl -fsS http://localhost:8000/api/health
          echo
          echo "----- /api/finance/counts -----"
          curl -fsS http://localhost:8000/api/finance/counts
          echo
          echo "----- /api/act5/counts -----"
          curl -fsS http://localhost:8000/api/act5/counts

          docker stop medallion-test >/dev/null
